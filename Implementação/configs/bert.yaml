# Configuracao do BASELINE (BERT) - GoEmotions multi-label
# Mesmo modelo usado no paper original (Demszky et al., 2020).
#
# Hiperparametros ajustados para GPU L4 (Colab Pro, 24GB).
# Para rodar local na GTX 1650 (4GB): reduza per_device_train_batch_size
# para 16 e gradient_accumulation_steps para 2 (batch efetivo continua 32).

model_name: bert-base-uncased
output_dir: results/bert
run_name: bert-base-goemotions

# Dados / tarefa
max_length: 64          # comentarios do Reddit sao curtos; 64 cobre quase tudo
threshold: 0.5          # limiar de decisao por classe (sigmoid)

# Hiperparametros de treino
training:
  per_device_train_batch_size: 64     # L4 (24GB) acomoda com folga (modelo base, max_length 64)
  per_device_eval_batch_size: 128
  gradient_accumulation_steps: 1       # batch efetivo = 64 (nao precisa acumular na L4)
  learning_rate: 2.0e-5
  num_train_epochs: 5
  weight_decay: 0.01
  warmup_ratio: 0.1
  fp16: true                           # Tensor Cores da L4: acelera e economiza VRAM
  logging_steps: 50

seed: 42
